name: snapshot-daily

on:
  schedule:
    - cron: "0 5 * * *"   # 00:00 ET / 05:00 UTC
  workflow_dispatch: {}    # allow manual runs from the GitHub UI
  # Re-warm daily snapshots on every deploy so a fresh production deploy is
  # never left cold. paths-ignore excludes the bot's own snapshot commits,
  # so this never re-triggers itself (the commit step also diff-guards).
  push:
    branches: [main]
    paths-ignore:
      - "data/snapshots/**"

permissions:
  contents: write           # required to commit the snapshot

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run snapshot:daily
        env:
          # Background batch job: allow large payloads / slow upstream without
          # aborting on the 8 s user-request default.
          JOLPICA_FETCH_TIMEOUT_MS: "30000"
      - name: commit snapshot if changed
        run: |
          git config user.name  "snapshot-bot"
          git config user.email "snapshot-bot@users.noreply.github.com"
          git add data/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes."
            exit 0
          fi
          git commit -m "chore(snapshots): daily refresh ($(date -u +%Y-%m-%d))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
