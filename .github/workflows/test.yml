name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke critical APIs (local server)
        run: |
          npm run start -- -p 3000 > /tmp/next-start.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          for i in {1..40}; do
            if curl -sSf http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 1
          done

          SMOKE_BASE_URL=http://127.0.0.1:3000 npm run smoke:api